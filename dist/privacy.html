document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t:space-between;\">\n    <a href=\"index.html\" style=\"text-decoration:none; color:#1B1A14; display:inline-flex; align-items:baseline; gap:1px; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.02em;\">\n      <span>inkset<\u002Fspan>\n      <span style=\"position:relative; display:inline-block; width:0; height:0;\">\n        <span style=\"position:absolute; left:0px; top:-13px; width:5px; height:5px; background:#1B1A14; border-radius:50%;\"><\u002Fspan>\n        <span style=\"position:absolute; left:6px; top:-17px; width:2px; height:2px; background:#1B1A14; border-radius:50%;\"><\u002Fspan>\n        <span style=\"position:absolute; left:4px; top:-8px; width:1.5px; height:1.5px; background:#3a382e; border-radius:50%;\"><\u002Fspan>\n      <\u002Fspan>\n    <\u002Fa>\n    <nav style=\"display:flex; gap:30px; font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase;\">\n      <a href=\"index.html\" style=\"text-decoration:none; color:#6A685C;\" style-hover=\"color:#1B1A14;\">Home<\u002Fa>\n      <a href=\"redacted.html\" style=\"text-decoration:none; color:#6A685C;\" style-hover=\"color:#1B1A14;\">Redacted<\u002Fa>\n      <a href=\"privacy.html\" style=\"text-decoration:none; color:#1B1A14;\">Privacy<\u002Fa>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <!-- title -->\n  <section style=\"max-width:760px; margin:0 auto; padding:80px 32px 40px;\">\n    <p style=\"font-family:'JetBrains Mono', monospace; font-size:12.5px; letter-spacing:0.26em; text-transform:uppercase; color:#A8682A; margin:0 0 24px;\">Privacy Policy<\u002Fp>\n    <h1 style=\"font-weight:500; font-size:clamp(36px,6vw,60px); line-height:1.05; letter-spacing:-0.015em; margin:0;\">The short version: we collect almost nothing.<\u002Fh1>\n    <p style=\"font-size:18px; line-height:1.7; color:#46443a; margin:26px 0 0; max-width:58ch;\">Inkset Games makes word puzzles, not profiles. This page explains, in plain language, what we do and don't do with your information.<\u002Fp>\n    <p style=\"font-family:'JetBrains Mono', monospace; font-size:11.5px; letter-spacing:0.14em; text-transform:uppercase; color:#8a887c; margin:28px 0 0;\">Effective 1 January 2025<\u002Fp>\n  <\u002Fsection>\n\n  <div style=\"max-width:760px; margin:0 auto; padding:0 32px;\"><div style=\"height:1px; background:#D8D5C8;\"><\u002Fdiv><\u002Fdiv>\n\n  <!-- body -->\n  <section style=\"max-width:760px; margin:0 auto; padding:48px 32px 30px;\">\n\n    <div style=\"margin:0 0 44px;\">\n      <h2 style=\"font-family:'JetBrains Mono', monospace; font-size:13px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:#1B1A14; margin:0 0 16px;\">What we collect<\u002Fh2>\n      <p style=\"font-size:18px; line-height:1.72; color:#34322a; margin:0 0 16px;\">Redacted runs as a daily puzzle. Your progress, scores, and streaks are stored on your own device so the game remembers where you left off. We don't need an account, and we don't ask for your name, email, or contacts to let you play.<\u002Fp>\n      <p style=\"font-size:18px; line-height:1.72; color:#34322a; margin:0;\">If you contact us directly, we'll have whatever you put in that message — and nothing more.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"margin:0 0 44px;\">\n      <h2 style=\"font-family:'JetBrains Mono', monospace; font-size:13px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:#1B1A14; margin:0 0 16px;\">Analytics<\u002Fh2>\n      <p style=\"font-size:18px; line-height:1.72; color:#34322a; margin:0;\">We may use privacy-respecting, aggregate analytics to understand how many people play and which puzzles land — counts and trends, never tied to your identity. We do not build advertising profiles, and we do not track you across other apps or sites.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"margin:0 0 44px;\">\n      <h2 style=\"font-family:'JetBrains Mono', monospace; font-size:13px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:#1B1A14; margin:0 0 16px;\">What we never do<\u002Fh2>\n      <p style=\"font-size:18px; line-height:1.72; color:#34322a; margin:0;\">We do not sell your data. We do not rent, trade, or hand it to advertisers. There is no hidden market for any of it, because we don't collect the kind of data anyone would want to buy.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"margin:0 0 44px;\">\n      <h2 style=\"font-family:'JetBrains Mono', monospace; font-size:13px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:#1B1A14; margin:0 0 16px;\">Children<\u002Fh2>\n      <p style=\"font-size:18px; line-height:1.72; color:#34322a; margin:0;\">Redacted is suitable for word lovers of all ages. We don't knowingly collect personal information from children, and the game requires no personal information to play.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"margin:0 0 44px;\">\n      <h2 style=\"font-family:'JetBrains Mono', monospace; font-size:13px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:#1B1A14; margin:0 0 16px;\">Your choices<\u002Fh2>\n      <p style=\"font-size:18px; line-height:1.72; color:#34322a; margin:0;\">Because your game data lives on your device, clearing your browser or app storage erases it. You stay in control of the little we keep.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"margin:0 0 44px;\">\n      <h2 style=\"font-family:'JetBrains Mono', monospace; font-size:13px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:#1B1A14; margin:0 0 16px;\">Changes<\u002Fh2>\n      <p style=\"font-size:18px; line-height:1.72; color:#34322a; margin:0;\">If this policy changes, we'll update the date at the top of this page. Meaningful changes will be noted clearly rather than buried.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"margin:0;\">\n      <h2 style=\"font-family:'JetBrains Mono', monospace; font-size:13px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:#1B1A14; margin:0 0 16px;\">Contact<\u002Fh2>\n      <p style=\"font-size:18px; line-height:1.72; color:#34322a; margin:0;\">Questions about your privacy, or anything else? Write to us at <span style=\"color:#A8682A;\">hello@inkset.games<\u002Fspan> and a human will read it.<\u002Fp>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- footer -->\n  <footer style=\"border-top:1px solid #D8D5C8; margin-top:50px;\">\n    <div style=\"max-width:1120px; margin:0 auto; padding:30px 32px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; font-family:'JetBrains Mono', monospace; font-size:11.5px; letter-spacing:0.1em; text-transform:uppercase; color:#8a887c;\">\n      <span>© 2025 Inkset Games<\u002Fspan>\n      <span>Made wherever the coffee is good<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
