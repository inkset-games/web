document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

yle=\"font-size:26px; line-height:1;\"><\u002Fspan>\n        <span style=\"display:flex; flex-direction:column; line-height:1.15; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;\">\n          <span style=\"font-size:10px; letter-spacing:0.04em; opacity:0.78;\">Download on the<\u002Fspan>\n          <span style=\"font-size:19px; font-weight:600; letter-spacing:-0.01em;\">App Store<\u002Fspan>\n        <\u002Fspan>\n      <\u002Fa>\n      <a href=\"#\" style=\"text-decoration:none; display:inline-flex; align-items:center; gap:11px; background:transparent; color:#E7E1D2; border:1px solid #322e20; border-radius:8px; padding:13px 22px;\" style-hover=\"border-color:#4a4636;\">\n        <span style=\"font-size:22px; line-height:1; color:#D08A3C;\">▶<\u002Fspan>\n        <span style=\"display:flex; flex-direction:column; line-height:1.15; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;\">\n          <span style=\"font-size:10px; letter-spacing:0.04em; opacity:0.7;\">Get it on<\u002Fspan>\n          <span style=\"font-size:19px; font-weight:600; letter-spacing:-0.01em;\">Google Play<\u002Fspan>\n        <\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- interactive demo -->\n  <section style=\"max-width:1080px; margin:0 auto; padding:24px 32px 40px;\">\n    <div style=\"border:1px solid #26241a; border-radius:10px; background:#121109; overflow:hidden;\">\n      <!-- demo header -->\n      <div style=\"display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; padding:20px 24px; border-bottom:1px solid #211f17;\">\n        <div style=\"display:flex; align-items:center; gap:16px;\">\n          <span style=\"font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.2em; color:#D08A3C; border:1px solid #4a3a1f; border-radius:4px; padding:5px 10px;\">NATURE<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono', monospace; font-size:12.5px; color:#8A8678; letter-spacing:0.04em;\">The Honeybee · Apis mellifera<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"font-family:'JetBrains Mono', monospace; font-size:12.5px; color:#a59f90; letter-spacing:0.06em;\">{{ revealedCount }}/{{ total }} restored<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- paragraph -->\n      <div style=\"padding:clamp(26px,4vw,44px); font-size:clamp(20px,2.5vw,27px); line-height:2.0; color:#E7E1D2;\">\n        <sc-for list=\"{{ segments }}\" as=\"seg\" hint-placeholder-count=\"9\">\n          <sc-if value=\"{{ seg.isText }}\" hint-placeholder-val=\"{{ true }}\"><span>{{ seg.text }}<\u002Fspan><\u002Fsc-if>\n          <sc-if value=\"{{ seg.isBlank }}\" hint-placeholder-val=\"{{ true }}\"><span onclick=\"{{ seg.onClick }}\" style=\"cursor:pointer; display:inline;\" style-hover=\"filter:brightness(1.45);\">\n            <sc-if value=\"{{ seg.revealed }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#D08A3C; font-weight:500; animation:inkreveal 0.32s ease both;\">{{ seg.word }}<\u002Fspan><\u002Fsc-if>\n            <sc-if value=\"{{ seg.hidden }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"display:inline-flex; gap:3px; vertical-align:-0.18em;\">\n              <sc-for list=\"{{ seg.boxes }}\" as=\"box\" hint-placeholder-count=\"5\"><span style=\"display:inline-block; width:0.74em; height:1.18em; background:#24221a; border:1px solid #322e20; border-radius:2px;\"><\u002Fspan><\u002Fsc-for>\n            <\u002Fspan><\u002Fsc-if>\n          <\u002Fspan><\u002Fsc-if>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- demo footer -->\n      <div style=\"display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; padding:18px 24px; border-top:1px solid #211f17;\">\n        <span style=\"font-family:'JetBrains Mono', monospace; font-size:11.5px; color:#6f6c60; letter-spacing:0.04em;\">Tap any blacked-out word to reveal it. A taste of the daily puzzle.<\u002Fspan>\n        <button onclick=\"{{ reset }}\" style=\"font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#a59f90; background:transparent; border:1px solid #322e20; border-radius:5px; padding:8px 14px; cursor:pointer;\" style-hover=\"color:#E7E1D2; border-color:#4a4636;\">Reset<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- how it works -->\n  <section style=\"max-width:1080px; margin:0 auto; padding:56px 32px 30px;\">\n    <p style=\"font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:0.22em; text-transform:uppercase; color:#6f6c60; margin:0 0 36px;\">How it works<\u002Fp>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:36px;\">\n      <div>\n        <p style=\"font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:0.2em; color:#D08A3C; margin:0 0 14px;\">01 · READ<\u002Fp>\n        <p style=\"font-size:17.5px; line-height:1.66; color:#a59f90; margin:0;\">A new paragraph appears each day. Today's subject could be anything worth knowing.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:0.2em; color:#D08A3C; margin:0 0 14px;\">02 · RESTORE<\u002Fp>\n        <p style=\"font-size:17.5px; line-height:1.66; color:#a59f90; margin:0;\">Tap a blacked-out word and type your guess. The letter count is your only map.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:0.2em; color:#D08A3C; margin:0 0 14px;\">03 · SOLVE<\u002Fp>\n        <p style=\"font-size:17.5px; line-height:1.66; color:#a59f90; margin:0;\">Fewer reveals, higher score. Come back tomorrow for a fresh passage.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- footer -->\n  <footer style=\"border-top:1px solid #211f17; margin-top:56px;\">\n    <div style=\"max-width:1080px; margin:0 auto; padding:30px 32px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; font-family:'JetBrains Mono', monospace; font-size:11.5px; letter-spacing:0.1em; text-transform:uppercase; color:#6f6c60;\">\n      <span>© 2025 Inkset Games<\u002Fspan>\n      <span>Redacted — a daily word game<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.PARTS = [\n      { t: \"A single hive holds tens of thousands of \" },\n      { b: \"bees\" },\n      { t: \", and together they build \" },\n      { b: \"combs\" },\n      { t: \" of astonishing precision. A forager returns from the field and dances a looping \" },\n      { b: \"waggle\" },\n      { t: \" on the wax, its angle and rhythm encoding the direction and \" },\n      { b: \"distance\" },\n      { t: \" of distant flowers. Through the coldest months the colony holds itself at a steady \" },\n      { b: \"temperature\" },\n      { t: \", shivering in unison to generate \" },\n      { b: \"heat\" },\n      { t: \". For all their industry, a worker lives only a few short \" },\n      { b: \"weeks\" },\n      { t: \", while a single \" },\n      { b: \"queen\" },\n      { t: \" may reign for years.\" },\n    ];\n    this.total = this.PARTS.filter(p => p.b).length;\n    this.state = { revealed: {} };\n  }\n\n  reveal(idx) {\n    this.setState(s => ({ revealed: { ...s.revealed, [idx]: true } }));\n  }\n\n  renderVals() {\n    const revealed = this.state.revealed;\n    let blankIdx = -1;\n    const segments = this.PARTS.map((p, i) => {\n      if (p.t !== undefined) {\n        return { isText: true, isBlank: false, text: p.t };\n      }\n      blankIdx += 1;\n      const idx = blankIdx;\n      const isRev = !!revealed[idx];\n      return {\n        isText: false,\n        isBlank: true,\n        revealed: isRev,\n        hidden: !isRev,\n        word: p.b,\n        boxes: Array.from({ length: p.b.length }, () => ({})),\n        onClick: () => this.reveal(idx),\n      };\n    });\n    return {\n      segments,\n      total: this.total,\n      revealedCount: Object.values(revealed).filter(Boolean).length,\n      reset: () => this.setState({ revealed: {} }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
